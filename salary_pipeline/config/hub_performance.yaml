# Hub W–AI 绩效列：按岗位族分治（对齐 提成依据.xlsx / commission_rules manifest）
#
# 设计原则（2026-07-06 决策：全面规则引擎，禁止逐格 topology 回放）：
# - 每个岗位族对应「一套固定规则」；同列因店别/姓名不同的差异，在规则内以
#   显式分组/模板选择器表达（如销售顾问 template_selector），不做按行号推断
# - 各岗位族的计算方法来自 提成依据 中对应 sheet（与 modules/ 业务模块一致）
# - 销售顾问 / 销售主管 / 销售助理已迁移为声明式规则引擎，三者共用同一套
#   规则与同一模块（config/hub_column_rules.yaml + pipelines/hub_rule_engine.py
#   + modules/sales_advisor_performance.py，2026-07-07 起统一）
# - 非一线管理（销售管理部/事业部/总经办）W/Y/X/Z 经 2026-05 金标准验证系人工
#   填入固定数值/引用人工子表，非系统计算列，登记为 delegate: manual_semantic
#   （hub_column_rules.yaml），W/Y/Z 暂留空 + 手工填入标注，不作 topology 兜底
#
# manifest: salary_pipeline/config/commission_rules/manifest.yaml
#
# overlay_path（Hub W–AI 写入口径）：
#   delegate_module      — 独立岗位族子表 + modules/*_performance.py，不读绩效整理表
#   hub_rule_engine_perf — HubRuleEngine + computed_perf_frame（系统绩效整理表）
#   hub_topology_or_static — 非一线管理手工/静态（非系统计算）
#
# 销售主线（终端明细等 → 绩效整理表 → Hub F–P → 销售顾问 overlay）仅覆盖
# 销售顾问/主管/助理；下列岗位族 overlay 在 sales.py PERFORMANCE_OVERLAY_REGISTRY
# 中独立运行，缺失岗位族上传表时 warning + 留空，不阻断试算。

role_families:
  新媒体:
    module: new_media_performance
    overlay_path: delegate_module
    rules_sheet: 新媒体
    algorithm: calculator_with_sumif_fallback
    match:
      店别: 新媒体销售部
    source:
      workbook: sales
      sheet: 新媒体
      name_col: Y
      value_col: AB
    hub_columns:
      - 整车绩效
    parity_gate: true

  销售顾问:
    # 2026-07-07：用户要求所有销售类岗位统一用本 family 的规则（见
    # hub_column_rules.yaml 顶部注释）；match 职务列表现含销售主管/销售助理，
    # 由同一个 SalesAdvisorPerformanceModule（match_advisor_row）负责写 overlay。
    # 原独立「销售主管」family（仅 W/Y/Z ×H）已并入本条并删除。
    module: sales_advisor_performance
    overlay_path: hub_rule_engine_perf
    rules_sheet: 销售提成标准
    algorithm: hub_rule_engine
    rule_config: hub_column_rules.yaml
    match:
      职务: [销售顾问, 销售主管, 销售助理]
    source:
      workbook: sales
      sheet: 绩效整理表
      advisor_col: P
    hub_columns:
      - 整车绩效
      - 加装绩效
      - 保险绩效
      - 延保提成
      - 特殊车型+指定车型
      - 金融绩效
      - 爱车宝绩效
      - 上户绩效
    # 164 条提成标准 ≠ 49 可比 Hub 行；仅 hub_linked 写 overlay（见 sales_advisor_roles.yaml）
    parity_gate: true

  邀约专员:
    module: invite_specialist_performance
    overlay_path: delegate_module
    rules_sheet: 邀约专员提成
    algorithm: calculator_with_sumif_fallback
    match:
      职务:
        - DCC邀约专员
        - 邀约专员
    source:
      workbook: sales
      sheet: 邀约专员提成
      name_col: C
      value_col: AF
    hub_columns:
      - 整车绩效
      - 整车完成考核
    parity_gate: true

  客户专员:
    module: customer_specialist_performance
    overlay_path: delegate_module
    rules_sheet: 客户部提成
    algorithm: cell_ref_subsheet
    match:
      店别: 客户关系部
    hub_columns:
      - 整车绩效
      - 权限结余绩效
      - 加装绩效
    # W–AI 已对齐（2026-06-24）：张保珍 / 邓芳 / 周舟 共 3 行在提成汇总
    # 李璐秀 / 郭静 / 古瑞婷 仅子表算薪，不在提成汇总（hub_linked: false）
    parity_gate: true

  直营店经理:
    module: direct_store_manager_performance
    overlay_path: delegate_module
    rules_sheet: 直营店经理提成 (财务)
    algorithm: store_block_with_attach_row
    match:
      姓名:
        - 朱剑波
        - 孙伟
        - 吴思超
        - 黎明朗
        - 钟涛
    hub_columns:
      - 整车完成考核
    parity_gate: true

  非一线管理:
  # 销售管理部 / 事业部 / 总经办：金标准 W/Y 子表头为岗位绩效/业绩绩效
  # 支持部门（财务部等）：row 161 子表头 M–Z，见 non_frontline_roles.yaml support tier
  # Hub 仍写物理列；系统另增全部语义列（含售后总产值、台次、提成系数等）
    overlay_path: hub_topology_or_static
    rules_sheet: 销售提成标准
    algorithm: hub_topology_or_static
    match:
      店别:
        - 销售管理部
        - 事业部
        - 总经办
    hub_columns:
      - 整车绩效
      - 加装绩效
    semantic_columns:
      - 售后总产值
      - 配件外销
      - 售后产值
      - 出库
      - 入库
      - 台次
      - 提成系数
      - 提成系数2
      - 岗位绩效
      - 业绩绩效
      - 新能源专项
      - 业绩绩效1
      - 业绩绩效2
    parity_gate: false

  招聘:
    module: recruit_performance
    overlay_path: delegate_module
    rules_sheet: 销售提成标准
    algorithm: team_allocation
    match:
      店别: 行政人事部
      姓名:
        - 周小红
        - 刘晓琴
        - 何婷婷
    source:
      workbook: sales
      sheet: 招聘
      team_block_cols:
        onboard_count: S
        commission_per_hire: T
        allocation: V
        amount: W
    hub_columns:
      - 保险绩效
    parity_gate: true

  内勤:
    module: store_clerk_performance
    overlay_path: hub_rule_engine_perf
    rules_sheet: 销售提成标准
    algorithm: hub_rule_engine
    rule_config: hub_column_rules.yaml
    match:
      职务: [内勤, 出纳+内勤]
    hub_columns:
      - 整车绩效
      - 权限结余绩效
      - 加装绩效
      - 保险绩效
      - 整车完成考核
    parity_gate: true

  网络顾问:
    module: network_advisor_performance
    overlay_path: hub_rule_engine_perf
    rules_sheet: 销售提成标准
    algorithm: hub_rule_engine
    rule_config: hub_column_rules.yaml
    match:
      职务: [网络部, 区域顾问, 销售内勤, 渠道]
    hub_columns:
      - 整车绩效
      - 权限结余绩效
      - 加装绩效
      - 保险绩效
    parity_gate: true

  新媒体翼真:
    module: yizhen_new_media_performance
    overlay_path: hub_rule_engine_perf
    rules_sheet: 销售提成标准
    algorithm: hub_rule_engine
    rule_config: hub_column_rules.yaml
    match:
      店别: 西物-翼真
      职务: 新媒体
    hub_columns:
      - 整车绩效
      - 权限结余绩效
      - 加装绩效
      - 保险绩效
      - 整车完成考核
    parity_gate: true

  按揭内勤:
    module: mortgage_clerk_performance
    overlay_path: delegate_module
    rules_sheet: 销售提成标准
    algorithm: cell_ref_subsheet
    match:
      职务: 按揭内勤
    source:
      workbook: sales
      sheet: 按揭绩效
    hub_columns:
      - 加装绩效
    parity_gate: true

# 月度运行配置（样板月 2026-05）
# 路径均相对于项目根目录，见 salary_pipeline/paths.py

month: "2026-05"

# Phase B：绩效整理表由 builder 重算后注入 HubFormulaEngine（T1）
performance_sheet:
  use_computed: true
  billing_month: "2026-05"
  use_golden_perf_sheet: false   # Hub 仅读 computed_perf_frame，不读金标准整理表数值

# Hub 公式回放：禁止回退读取金标准提成汇总单元格数值
hub:
  bootstrap_from_golden: false
  activity_column_name: "04月活动"

workbooks:
  sales: "data/raw/2026-05/燃油车-2026年05月西物超市销售提成(终)(1).xlsx"
  aftersales: "data/raw/2026-05/燃油车-2026年05月吉利超市售后提成(终)(1).xlsx"
  rules: "data/raw/2026-05/提成依据.xlsx"

topology:
  sales: "data/topology/2026-05/燃油车-2026年05月西物超市销售提成(终)(1).topology.json"
  aftersales: "data/topology/2026-05/燃油车-2026年05月吉利超市售后提成(终)(1).topology.json"
  rules: "data/topology/2026-05/提成依据.topology.json"

outputs:
  cache_dir: "output/2026-05/cache"
  commission_summary_sheet: "提成汇总"
  commission_summary_file: "output/2026-05/提成汇总.xlsx"
  performance_sheet_file: "output/2026-05/绩效整理表-系统生成.xlsx"
  aftersales_wuhou: "output/2026-05/05月提成-武侯售后.xlsx"
  aftersales_airport: "output/2026-05/05月提成-机场售后.xlsx"
  xw_payout: "output/2026-05/XW提成-发.xlsx"
  direct_store_payout: "output/2026-05/直营店提成-发.xlsx"
  cs_payout: "output/2026-05/CS提成-发.xlsx"
  report_dir: "output/2026-05/reports"

parity:
  golden_workbook: "data/raw/2026-05/燃油车-2026年05月西物超市销售提成(终)(1).xlsx"
  golden_sheet: "提成汇总"
  header_row: 2
  data_start_row: 3
  join_keys:
    - 店别
    - 职务
    - 姓名
  numeric_tolerance: 1.0e-6
  auto_highlight: true
  highlight_mode: mismatch_only
  # F–P：财务/流水线硬验收（CI gate）
  columns:
    - 考核量
    - 实际销量
    - 销量完成率
    - 集客达成率
    - 加装额
    - 加装销量完成率
    - 保险渗透率
    - 整车毛利
    - 加装毛利
    - 保险毛利
    - 按揭毛利
  # AM–AP 等：Hub SUMIF 调整列（全员比对，不受 parity_gate 限制）
  adjustment_columns:
    - 综合项
    - 04月活动
    - 超期
    - （已发放奖励）
  # W–AI：绩效块跟踪对账（不阻断 F–P 验收；按岗位族逐步替换金标准 bootstrap）
  performance_columns:
    - 整车绩效
    - 权限结余绩效
    - 加装绩效
    - 保险绩效
    - 金融绩效
    - 爱车宝绩效
    - 上户绩效
    - 盈利产品绩效
    - 延保提成
    - 特殊车型+指定车型
    - 座位险提成
    - 二手车提成
    - 玻碎险提成

aftersales:
  header_row: 3
  data_start_row: 5
  stores:
    wuhou:
      anchor_sheet: "05月提成-武侯售后"
      golden_workbook: "data/raw/2026-05/燃油车-2026年05月吉利超市售后提成(终)(1).xlsx"
    airport:
      anchor_sheet: "05月提成-机场售后"
      golden_workbook: "data/raw/2026-05/燃油车-2026年05月吉利超市售后提成(终)(1).xlsx"

aftersales_parity:
  join_keys:
    - 店别
    - 姓名
  role_column: 店别
  numeric_tolerance: 1.0e-6
  header_row: 3
  data_start_row: 5
  columns:
    - 其他补贴
    - 单位社保
    - 个人社保
    - 个人公积金
    - 其它
    - 基本工资
    - 当月应计提绩效
    - 综合考核/其他
    - 应付提成工资
    - 代扣社保
    - 实付提成
    - 其它_P
    - 已发并税
    - 计税工资
    - 代扣个税
    - 已扣税
    - 实际扣税
    - 其他(代扣项)
    - 实发提成

payout:
  data_start_row: 3
  xw:
    anchor_sheet: "XW提成-发"
    golden_workbook: "data/raw/2026-05/燃油车-2026年05月西物超市销售提成(终)(1).xlsx"
  direct_store:
    anchor_sheet: "直营店提成-发"
    golden_workbook: "data/raw/2026-05/燃油车-2026年05月西物超市销售提成(终)(1).xlsx"
  cs:
    anchor_sheet: "CS提成-发"
    golden_workbook: "data/raw/2026-05/燃油车-2026年05月西物超市销售提成(终)(1).xlsx"

payout_parity:
  join_keys:
    - 店别
    - 职务
    - 姓名
  role_column: 店别
  numeric_tolerance: 1.0e-4
  data_start_row: 3
  columns:
    - 考核量
    - 销售数量
    - 整车绩效
    - 提成合计
    - 应发放合计
    - 实际发放
    - 基本工资（含补助）
    - 实际发放_AS
    - 年终绩效

direct_store_parity:
  join_keys:
    - 店别
    - 职务
    - 姓名
  role_column: 店别
  numeric_tolerance: 1.0e-4
  data_start_row: 3
  columns:
    - 考核量
    - 销售数量
    - 整车绩效
    - 提成合计
    - 应发放合计
    - 代发放绩效(银河A+B)
    - 实际发放
    - 基本工资（含补助）
    - 实际发放_AS
    - 年终绩效

cs_parity:
  join_keys:
    - 店别
    - 职务
    - 姓名
  role_column: 店别
  numeric_tolerance: 1.0e-4
  data_start_row: 3
  columns:
    - 考核量
    - 销售数量
    - 整车绩效
    - 提成合计
    - 应发放合计
    - 实际发放
    - 基本工资（含补助）
    - 实际发放_AS
    - 年终绩效

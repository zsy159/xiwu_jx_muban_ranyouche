# 非一线岗位族 — 提成汇总物理列复用子表头，系统另增语义列展示。
#
# 原则：Hub 快照在复制前落盘（F–P / SUMIF 回放用物理列）；导出前对非一线行
# 从物理列复制到语义列后清空物理列，避免用户看到重复数据。
#
# management：销售管理部 / 事业部 / 总经办（row 138/145 子表头，W/Y）
# support：财务部 / 市场部 / 物流等（row 161 子表头，M–Z）

management:
  shops:
    - 销售管理部
    - 事业部
    - 总经办
  # 店别未命中 shops 时的补充；门店块销售总监（有店别且不在 management shops）仍走顾问 SUMIFS
  role_patterns:
    - 实习销售总监
    - 网销经理
  column_mapping:
    整车绩效: 岗位绩效
    加装绩效: 业绩绩效

support:
  # 金标准 row 162+ 全部支持部门店别
  shops:
    - 财务部
    - 市场部
    - 物流
    - 上户部
    - 增值业务部
    - 客户关系部
    - 行政人事部
    - 销售支持
    - 机场网销
    - 武侯展厅
    - 其它
  column_mapping:
    整车毛利: 售后总产值
    加装毛利: 配件外销
    爱车宝毛利: 售后产值
    上户毛利: 出库
    整车+加装（毛利）: 入库
    综合毛利: 台次
    主营单台毛利: 提成系数
    综合单台毛利: 提成系数2
    整车绩效: 岗位绩效
    权限结余绩效: 新能源专项
    加装绩效: 业绩绩效1
    保险绩效: 业绩绩效2

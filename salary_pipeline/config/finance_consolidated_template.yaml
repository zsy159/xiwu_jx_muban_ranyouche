# 财务合并填写模板 — 工作簿结构（仅文档/生成脚本用，不接入 ingestion）
#
# 用途：财务试填一份账套，熟悉列位；生产流水线仍读 data/raw/<月>/uploads/*.xlsx
# 生成：python scripts/generate_finance_consolidated_workbook.py --month 2026-05

workbook_name_pattern: "销售账套-财务合并-{month}.xlsx"
example_month: "2026-05"

readme_sheet:
  name: README
  title: 销售账套财务合并模板 — 填账规则

skeleton:
  sheets:
    - name: 人员信息
      header_row: 1
      key_labels: [店别, 职务, 姓名]
      note: 提成汇总 / 发薪表行键

# VIN 粒度销售主表（原多表 → 一表；列注册见 canonical_column_registry.yaml）
sales_sheet:
  name: 销售
  registry: canonical_column_registry.yaml
  note: 一行一车；含原 系统销售毛利 / 保险 / 按揭 / 成本 / 终端 等闭包输入列

# 提成依据参数组（lookup / 任务；sheet 名与 uploads 原名对照见填表说明）
commission_basis_sheets:
  label: 提成依据参数
  sheets:
    - name: 提成依据
      source_sheet: 销售提成标准
      source_workbook: 提成依据
      header_row: 1
      note: 单台绩效 lookup（原 提成依据.xlsx·销售提成标准）

    - name: 比对表
      source_sheet: 比对表
      header_row: 1
      note: 部门/车种映射

    - name: 销售任务及完成率
      source_sheet: 销售任务及完成率
      header_row: 1
      note: Hub F/G/H/I、销售顾问 BA 乘数

# 岗位族直引表（delegate_module；当月有对应人员再填）
role_direct_fetch_sheets:
  label: 岗位直引
  sheets:
    - name: 经理
      source_sheet: 直营店经理提成 (财务)
      header_row: 1
      role_family: 直营店经理
      hub_columns: [整车完成考核]

    - name: 邀约专员
      source_sheet: 邀约专员提成
      header_row: 1
      role_family: 邀约专员
      hub_columns: [整车绩效, 整车完成考核]

    - name: 客服专员
      source_sheet: 客户部提成
      header_row: 1
      role_family: 客户专员
      hub_columns: [整车绩效, 权限结余绩效, 加装绩效]

    - name: 按揭专员
      source_sheet: 按揭绩效
      header_row: 2
      header_template_rows: 3
      role_family: 按揭内勤
      hub_columns: [加装绩效]

    - name: 新媒体
      source_sheet: 新媒体
      header_row: 1
      role_family: 新媒体
      hub_columns: [整车绩效]

    - name: 招聘
      source_sheet: 招聘
      header_row: 1
      role_family: 招聘
      hub_columns: [保险绩效]

exception_sheet:
  name: 例外登记表
  columns:
    - {id: store, label: 店别}
    - {id: role, label: 职务}
    - {id: name, label: 姓名}
    - {id: column, label: 列名}
    - {id: system_value, label: 系统值}
    - {id: confirmed_value, label: 确认值}
    - {id: delta, label: 差额}
    - {id: reason, label: 原因}
    - {id: approver, label: 审批人}

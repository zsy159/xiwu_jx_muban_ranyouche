# 销售顾问岗位族 — Phase C 业务模块（2026-05 金标准）
#
# hub_linked 策略（README N5）：
# - 提成汇总 职务=销售顾问 且姓名非「空白」→ hub_linked: true（约 49 人可比）
# - 销售提成标准 JSON 共 53 条顾问记录 + 其余职务混排 → 多数仅子表算薪
# - 子表全员算薪、部分写 Hub：与招聘/客户专员相同模式
#
# 公式来源：Hub topology 解析 → calculators/sales_advisor/topology_specs.py
# 数据来源：Phase B computed_perf_frame（绩效整理表）+ 销售提成标准（闭包列 AG 等已在 builder 内化）

# 模块 overlay + parity_gate 对账列（含图中五列 W/Y/Z/AE/AF）
hub_columns:
  - 整车绩效
  - 加装绩效
  - 保险绩效
  - 延保提成
  - 特殊车型+指定车型
  - 金融绩效
  - 爱车宝绩效
  - 上户绩效

# 图中五列 · 金标准手工格 — 对账暂跳过，待业务确认后再建模
wa_parity_deferred:
  - name: 韩柏成
    columns:
      整车绩效: 翼真店 AG/W 与提成标准 lookup 不一致（金标准手工）
      保险绩效: Hub Z134 = SUMIF(AJ)+600 手工常数
      加装绩效: Y134=1000 静态格无公式
  - name: 沈燕1
    columns:
      整车绩效: 翼真店 AG 金标准与系统提成标准不一致
      保险绩效: 翼真保险绩效金标准手工录入
  - name: 唐操
    columns:
      整车绩效: 渠道 I 个案（L6T78XCZ5TY782006），待核对后修 order_context

# 门店块顾问：整车绩效乘 BA 店别完成率（非个人 H）
store_block_pattern:
  multiply_ref_prefix: BA

# 仅子表、不进 Hub 的顾问样例（销售提成标准有条目但无提成汇总行）
subsheet_only_examples:

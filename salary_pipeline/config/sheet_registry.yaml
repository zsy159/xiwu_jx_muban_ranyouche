# 表角色：
#   input   = 当月原始数据
#   formula = 中间公式表（由模块重算）
#   hub     = 汇总枢纽（跨岗位/跨店聚合，供各「发」表取数；非最终发薪表）
#   output  = 最终发薪表（财务/人力实际使用，禁止作为输入导入）

sales_workbook:
  终端明细表:
    role: input
    header_row: 1
  整车成本:
    role: input
    header_row: 1
  工厂购进:
    role: input
    header_row: 1
    note: 绩效整理表 F(购进公司) INDEX/MATCH by VIN；整车成本公式上游
  按揭明细:
    role: input
    header_row: 1
  保险明细:
    role: input
    header_row: 1
  装饰台账:
    role: input
    header_row: 1
  翼真考核:
    role: input
    header_row: 1
    required: false
    note: 新媒体翼真 AK 列 SUMIF 源；岗位族专用，缺失不阻断试算
  按揭原表:
    role: input
    header_row: 1
    note: 绩效整理表 AL/闭包 Z；按揭明细公式上游（Phase B Slice 3）
  按揭绩效:
    role: input
    header_row: 1
    required: false
    note: 按揭内勤 Hub 加装绩效（Y）引用 AF 列；岗位族专用，缺失不阻断试算
  指标汇总:
    role: input
    header_row: 1
    note: 提成汇总算术公式引用（如 M−指标汇总!E）；Hub METRICS_SHEET，尚未系统重算
  保客考核明细:
    role: input
    header_row: 1
    note: 提成汇总 AR 列 SUMIF 保客考核（纯输入）
  直营店交车:
    role: input
    header_row: 1
    note: 提成汇总 AQ 列 SUMIF 直营店交车奖励（纯输入）
  综合表:
    role: input
    header_row: 1
    note: 提成汇总 AM/AP 列 SUMIF 综合项与考核小计；中间公式表，上传需含当月结果
  系统销售毛利:
    role: input
    header_row: 2
    note: 订单骨架 O/G/P + INDEX/MATCH 顾问列（Phase B Slice 4）
  系统二手车降价:
    role: input
    header_row: 2
    note: 绩效整理表 BE(代交车佣金) INDEX/MATCH by VIN；系统销售毛利公式上游
  产品经理提成核算:
    role: input
    header_row: 1
    required: false
    note: Hub 拓扑回放 — 管理岗整车完成考核等（如 AK）；有管理岗行键时再上传
  销售管理岗提成依据 新标:
    role: input
    header_row: 1
    required: false
    note: Hub 拓扑回放 — 销售管理岗 AK 等列 SUMIF/INDEX 上游；有管理岗行键时再上传
  销售任务及完成率:
    role: formula
    header_row: 1
    produced_by: sales_task_module
  绩效整理表:
    role: formula
    header_row: 1
    produced_by: performance_module
  渗透率:
    role: formula
    header_row: 1
    produced_by: penetration_module
  提成汇总:
    role: hub
    header_row: 2
    data_start_row: 3
    produced_by: commission_summary_builder
    note: 汇总枢纽；约 55% 的「发」表公式格通过 SUMIF 从此表取数；少量列（如 BB/BC）回引各「发」表形成 Excel 环
  XW提成-发:
    role: output
    header_row: 1
    produced_by: xw_payout_builder
    note: 西物超市最终发薪表；主数据来自提成汇总
  CS提成-发:
    role: output
    header_row: 1
    produced_by: cs_payout_builder
  直营店提成-发:
    role: output
    header_row: 1
    produced_by: direct_store_payout_builder
  XW提成-翼真发:
    role: output
    header_row: 1
    produced_by: yizhen_payout_builder

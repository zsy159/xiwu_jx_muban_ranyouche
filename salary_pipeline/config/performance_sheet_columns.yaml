# 销售顾问 Hub W–AI 直接引用的列（优先内化）
advisor_hub_columns:
  W: AG
  Y: AH
  Z: AJ
  AA: AI
  AB: AK
  AC: [AN, AS]   # 双 SUMIF 链
  AD: AL
  AE: AM
  AF: AO
  AG: AP
  AH: AQ
  AI: AR

# Slice 1：明细 SUMIF 可直接重算的列
detail_sumif_columns:
  AB:
    source_sheet: 保险明细
    key_col: D
    value_col: BP
    formula: "=SUMIF(保险明细!D:D,O,保险明细!BP:BP)"
    slice: 1
    status: implemented
  AJ:
    source_sheet: 保险明细
    key_col: D
    value_col: BS
    formula: "=SUMIF(保险明细!D:D,O,保险明细!BS:BS)"
    slice: 1
    status: implemented
  AK:
    source_sheet: 按揭明细
    key_col: G
    value_col: BO
    formula: "=SUMIF(按揭明细!G:G,O,按揭明细!BO:BO)"
    slice: 1
    status: implemented
  AO:
    source_sheet: 保险明细
    key_col: D
    value_col: BU
    formula: "=SUMIF(保险明细!D:D,O,保险明细!BU:BU)"
    slice: 2
    status: implemented
  AP:
    source_sheet: 保险明细
    key_col: D
    value_col: BV
    formula: "=SUMIF(保险明细!D:D,O,保险明细!BV:BV)"
    slice: 2
    status: implemented
  AL:
    source_sheet: [按揭原表, 按揭明细]
    key_col: [AC, G]
    value_col: [AF, BR]
    formula: "=SUMIF(按揭原表!AC:AC,O,按揭原表!AF:AF)+SUMIF(按揭明细!G:G,O,按揭明细!BR:BR)"
    slice: 3
    status: implemented
  BH:
    source_sheet: 装饰台账
    key_col: N
    criteria_col: G
    value_col: AK
    formula: "=SUMIFS(装饰台账!AK:AK,装饰台账!N:N,G)"
    slice: 3
    status: implemented
  AW:
    source_sheet: 整车成本
    key_col: K
    value_col: R
    formula: "=INDEX(整车成本!R:R,MATCH(O,整车成本!K:K,0))"
    slice: 3
    status: implemented
  AX:
    source_sheet: 整车成本
    key_col: K
    value_col: S
    formula: "=INDEX(整车成本!S:S,MATCH(O,整车成本!K:K,0))"
    slice: 3
    status: implemented
  AY:
    source_sheet: 整车成本
    key_col: K
    value_col: T
    formula: "=INDEX(整车成本!T:T,MATCH(O,整车成本!K:K,0))"
    slice: 3
    status: implemented
  AZ:
    source_sheet: 整车成本
    key_col: K
    value_col: U
    formula: "=INDEX(整车成本!U:U,MATCH(O,整车成本!K:K,0))"
    slice: 3
    status: implemented
  BA:
    source_sheet: 整车成本
    key_col: K
    value_col: V
    formula: "=INDEX(整车成本!V:V,MATCH(O,整车成本!K:K,0))"
    slice: 3
    status: implemented
  BB:
    source_sheet: 整车成本
    key_col: K
    value_col: W
    formula: "=INDEX(整车成本!W:W,MATCH(O,整车成本!K:K,0))"
    slice: 3
    status: implemented

# Slice 5：Hub W–AI 闭包列（全表脱离金标准值列）
closure_columns:
  AG:
    sources: [系统销售毛利, 比对表, 提成标准]
    slice: 5
    status: implemented
  AH:
    sources: [系统销售毛利, 比对表, 装饰台账, 保险明细, 按揭明细, 提成标准]
    slice: 5
    status: implemented
  AI:
    sources: [系统销售毛利, 装饰台账]
    slice: 5
    status: implemented
  AM:
    source_sheet: 爱车保
    formula: "=SUMIF(爱车保!F:F,O,爱车保!BA:BA)"
    slice: 5
    status: implemented
  AN:
    source_sheet: 上户提成
    formula: "=SUMIF(上户提成!B:B,O,上户提成!H:H)"
    slice: 5
    status: implemented
  AS:
    source_sheet: 置换服务
    formula: "=SUMIF(置换服务!G:G,O,置换服务!BB:BB)"
    slice: 5
    status: implemented
  AQ:
    sources: [重功超期+活动, 提成标准, 系统销售毛利, 比对表]
    slice: 5
    status: implemented
  AR:
    sources: [二手置换 , 大客户]
    slice: 5
    status: implemented
  AT:
    source_sheet: 延保提成
    formula: "=IF(SUMIF(延保提成!F:F,O,延保提成!BE:BE)<0,-200,IF(SUMIF(...)>0,200,0))"
    slice: 6
    status: implemented
  BC:
    source_sheet: 终端明细表
    formula: "=-IF(AND(K<>0,K<>\"\"),SUMIFS(终端明细表!P, C, O),0)"
    slice: 6
    status: implemented

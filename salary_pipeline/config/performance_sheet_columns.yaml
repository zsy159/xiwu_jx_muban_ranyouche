# 绩效整理表列注册 — Phase B 按 Hub 销售顾问闭包逐列内化
# 金标准公式见 docs/iterations/sales-advisor/PHASE-B-PLAN.md

sheet: 绩效整理表
data_start_row: 3   # Excel 1-based; row 2 = headers
join_key: O         # VIN — 多数明细 SUMIF 的 criteria 列

# Slice 4：订单骨架 O/P/K/G（脱离金标准引导）
order_skeleton:
  billing_month: "2026-05"
  primary_sheet: 系统销售毛利
  terminal_sheet: 终端明细表   # BC 列 SUMIFS(终端明细表!P, C, O)；Slice 4 登记 ingestion
  vehicle_order_type: 含整车订单
  keys:
    O: {source_sheet: 系统销售毛利, col: BD}
    G: {source_sheet: 系统销售毛利, col: B}
    P: {source_sheet: 系统销售毛利, col: BJ, formula: "=INDEX(系统销售毛利!BJ:BJ,MATCH(O,BD,0))"}
    K: {default: 1}
  # Hub 关联顾问别名 / 同人多单后缀（金标准 P ≠ BJ 的 11 处）

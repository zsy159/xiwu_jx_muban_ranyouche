    - {advisor: 熊俊杰, column: AI, amount: 240, note: "金标准无VIN手工尾行，影响 Hub 加装绩效"}

# 盈利产品 AL：金标准对门店/分公司块 P 值不写公式（93 行），系统不算按揭 SUMIF
